    <!-- =================================================== Modals ========================================================================== -->
        <!-- login modal -->
        <div class="modal fade" id="loginInModal" tabindex="-1" aria-labelledby="loginInModalLabel" aria-hidden="true">
            <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                <h5 class="modal-title" id="loginInModalLabel">Login</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
        
                <div class="modal-body">
                <!-- Add needs-validation and novalidate -->
                <form id="loginForm" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <div class="input-group has-validation">
                            <span class="input-group-text" id="inputGroupPrepend">@</span>
                            <input type="text" class="form-control" id="username-login-input" aria-describedby="inputGroupPrepend" required placeholder="Username">
                            <div class="invalid-feedback">
                            Please enter a username.
                            </div>
                        </div>
                    </div>
        
                    <div class="mb-3">
                        <div class="input-group mb-3">
                            <button class="btn btn-outline-secondary toggle-password" type="button" data-target = "login-password-input">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-eye-slash" viewBox="0 0 16 16">
                                    <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755q-.247.248-.517.486z"/>
                                    <path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829"/>
                                    <path d="M3.35 5.47q-.27.24-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z"/>
                                </svg>
                            </button>
                            <input type="password" class="form-control" placeholder="Password" required id = 'login-password-input'>
                            <div class="invalid-feedback">Password is required.</div>
                        </div>
                    </div>
                    <p id = 'lgoin-faild' style="margin:0; text-align: center; color:red; font-weight: 700; display: none;"></p>
                </form>
                </div>
        
                <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <!-- Change to submit -->
                <button type="submit" form="loginForm" class="btn btn-primary d-flex align-items-center gap-2" id="login-form-btn">
                    <div class="spinner-border d-none" role="status" id = 'login-spinner-loadding'>
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    Login
                    </button>
                </div>
            </div>
            </div>
        </div>      
        <!--// login modal //-->

        <!-- register modal -->
        <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
            <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="registerModalLabel">Register</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
        
                <div class="modal-body">
                <!-- Add needs-validation and novalidate -->
                    <form id="registerForm" class="needs-validation" novalidate>
                        <div class="input-group has-validation mb-3">
                            <span class="input-group-text" id="inputGroupPrepend">@</span>
                            <input type="text" class="form-control" id="username-register-input" aria-describedby="inputGroupPrepend" required placeholder="Username">
                            <div class="invalid-feedback">
                                Please enter a username.
                            </div>
                        </div>

                        <div class="input-group mb-3">
                            <button class="btn btn-outline-secondary toggle-password" type="button" data-target = "register-password-input">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-eye-slash" viewBox="0 0 16 16">
                                    <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755q-.247.248-.517.486z"/>
                                    <path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829"/>
                                    <path d="M3.35 5.47q-.27.24-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z"/>
                                </svg>
                            </button>
                            <input type="password" class="form-control" placeholder="Password" required id = 'register-password-input'>
                            <div class="invalid-feedback">Password is required.</div>
                        </div>

                        <div class="input-group mb-3 has-validation">
                            <input type="email" class="form-control" placeholder="Email" aria-label="email-span" aria-describedby="email-span" id="email-register-input" required>
                            <span class="input-group-text" id="email-span">@example.com</span>
                            <div class="invalid-feedback">
                                Please enter a email.
                            </div>
                        </div>

                        <!-- <div class="input-group mb-3 has-validation">
                            <input type="file" class="form-control" id="upload-profile-img" accept=".png, .jpg, .jpeg," required>
                            <div class="invalid-feedback">
                                Please select an image for you profile.
                            </div>
                        </div> -->
                        
                        <div class="input-group mb-3 has-validation">
                            <input type="text" class="form-control" id="register-name-input" placeholder="name" required>
                            <div class="invalid-feedback">
                                Please enter your name.
                            </div>
                        </div>
                        <p id = 'register-faild' style="margin:0; text-align: center; color:red; font-weight: 700; display: none;"></p>
                    </form>
                </div>
        
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <!-- Change to submit -->
                    <button type="submit" form="registerForm" class="btn btn-primary d-flex align-items-center gap-2" id="register-form-btn">
                        <div class="spinner-border d-none" role="status" id = 'register-spinner-loadding'>
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        Register
                    </button>
                </div>
            </div>
            </div>
        </div>  
        <!--// register modal //-->
    <!-- ===================================================// Modals //========================================================================== -->

    <!-- =================================================== alerts ========================================================================== -->
        <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
            <symbol id="check-circle-fill" fill="currentColor" viewBox="0 0 16 16">
            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
            </symbol>
            <symbol id="info-fill" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
            </symbol>
            <symbol id="exclamation-triangle-fill" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
            </symbol>
        </svg>
        <div id = 'alert-container'></div>
    <!-- ===================================================// alerts //========================================================================== -->
</body>
